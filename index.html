<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Screen Grid Tester</title>
    <style>
        /* CSS Variables */
        :root {
            --bg-color: #1e1e2f;
            --text-color: #ffffff;
            --panel-bg: #2a2a40;
            --primary: #00d2ff;
            --primary-hover: #3a7bd5;
            --danger: #ff4b2b;
            --danger-hover: #ff416c;
            --success: #11998e;
            --success-hover: #38ef7d;
            --border-radius: 8px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        /* Control Panel */
        .control-panel {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.9rem;
            color: #ccc;
        }

        input {
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #1a1a24;
            color: white;
            min-width: 250px;
        }

        input[type="number"] {
            min-width: 100px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: 0.3s ease;
            margin-top: 20px;
        }

        .btn-start {
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
        }

        .btn-play {
            background: linear-gradient(to right, var(--success), var(--success-hover));
        }

        .btn-stop {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* Grid Container for Screens */
        .screens-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            width: 100%;
        }

        .screen-wrapper {
            background: #000;
            border-radius: var(--border-radius);
            overflow: hidden;
            aspect-ratio: 16 / 9;
            border: 2px solid #444;
            position: relative;
        }

        .screen-number {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            z-index: 10;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Control Panel -->
    <div class="control-panel">
        <div class="input-group">
            <label for="urlInput">ভিডিও বা ওয়েবসাইটের লিংক (URL)</label>
            <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." required>
        </div>

        <div class="input-group">
            <label for="countInput">কয়টি স্ক্রিন বানাবেন?</label>
            <input type="number" id="countInput" min="1" max="100" value="4">
        </div>

        <button class="btn-start" id="startBtn">১. স্ক্রিন তৈরি করুন</button>
        <button class="btn-play" id="playAllBtn" style="display: none;">২. সব একসাথে চালু করুন</button>
        <button class="btn-stop" id="stopBtn">মুছুন (Clear)</button>
    </div>

    <!-- Container where all screens will appear -->
    <div class="screens-container" id="screensContainer">
        <!-- Iframes will be injected here via JavaScript -->
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const playAllBtn = document.getElementById('playAllBtn');
        const stopBtn = document.getElementById('stopBtn');
        const urlInput = document.getElementById('urlInput');
        const countInput = document.getElementById('countInput');
        const container = document.getElementById('screensContainer');

        // ইউটিউব এবং ফেসবুক লিংক কনভার্ট করার ফাংশন (isAutoplay প্যারামিটারসহ)
        function getEmbedUrl(url, isAutoplay = false) {
            let embedUrl = url;
            
            // অটো-প্লে অন থাকলে মিউট করতে হবে (ব্রাউজার পলিসির জন্য), নাহলে সাধারণ লিংক
            const ytParams = isAutoplay ? "?autoplay=1&mute=1&enablejsapi=1" : "?rel=0&enablejsapi=1";
            const fbParams = isAutoplay ? "&autoplay=true&mute=true" : "&autoplay=false";
            
            if (url.includes("youtube.com/watch?v=")) {
                const videoId = url.split("v=")[1].split("&")[0];
                embedUrl = `https://www.youtube.com/embed/${videoId}${ytParams}`;
            } else if (url.includes("youtu.be/")) {
                const videoId = url.split("youtu.be/")[1].split("?")[0];
                embedUrl = `https://www.youtube.com/embed/${videoId}${ytParams}`;
            } 
            else if (url.includes("facebook.com") || url.includes("fb.watch")) {
                embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=false&width=auto${fbParams}`;
            }
            
            return embedUrl;
        }

        // Start Button Logic (স্ক্রিন তৈরি করবে কিন্তু অটো-প্লে হবে না)
        startBtn.addEventListener('click', () => {
            const rawUrl = urlInput.value.trim();
            const count = parseInt(countInput.value, 10);

            if (!rawUrl) {
                alert("দয়া করে একটি লিংক প্রদান করুন!");
                return;
            }

            if (count < 1 || count > 100) {
                alert("১ থেকে ১০০ এর মধ্যে স্ক্রিন সংখ্যা দিন।");
                return;
            }

            container.innerHTML = '';
            
            // প্রথমে অটো-প্লে ছাড়াই লিংক জেনারেট করা হবে
            const finalUrl = getEmbedUrl(rawUrl, false);

            for (let i = 1; i <= count; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'screen-wrapper';
                
                if(finalUrl.includes("facebook.com/plugins/video.php")) {
                    wrapper.style.aspectRatio = "auto";
                    wrapper.style.minHeight = "400px";
                }

                const badge = document.createElement('div');
                badge.className = 'screen-number';
                badge.innerText = `Screen ${i}`;

                const iframe = document.createElement('iframe');
                iframe.src = finalUrl;
                iframe.allow = "autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share";
                iframe.allowFullscreen = true;
                // ভিউ কাউন্ট হওয়ার সম্ভাবনা বাড়াতে সঠিক Referrer Policy যুক্ত করা হলো
                iframe.setAttribute("referrerpolicy", "strict-origin-when-cross-origin");
                iframe.setAttribute("title", "Video Player");
                iframe.style.border = "none";
                iframe.style.overflow = "hidden";

                wrapper.appendChild(badge);
                wrapper.appendChild(iframe);
                container.appendChild(wrapper);
            }
            
            // স্ক্রিন তৈরি হলে Play All বাটনটি দৃশ্যমান হবে
            playAllBtn.style.display = "inline-block";
        });

        // Play All Button Logic (সবগুলো ভিডিও একসাথে প্লে করবে)
        playAllBtn.addEventListener('click', () => {
            const rawUrl = urlInput.value.trim();
            if (!rawUrl) return;

            // অটো-প্লে প্যারামিটার যুক্ত লিংক জেনারেট করা
            const autoPlayUrl = getEmbedUrl(rawUrl, true);
            const iframes = document.querySelectorAll('.screen-wrapper iframe');
            
            // সকল iframe এর src আপডেট করে দিলে সবগুলো একসাথে প্লে হওয়া শুরু করবে
            iframes.forEach(iframe => {
                iframe.src = autoPlayUrl;
            });
        });

        // Clear Button Logic
        stopBtn.addEventListener('click', () => {
            container.innerHTML = ''; 
            playAllBtn.style.display = "none"; // Play All বাটন লুকিয়ে ফেলা
        });
    </script>
</body>
</html>
